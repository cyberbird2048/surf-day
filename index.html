<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>今天冲浪吗</title>
</head>
<body>
<!--APP-->
<style>
:root{
  --paper:#FAFAF7; --paper2:#EEF4F8; --card:#EEF4F8; --line:#D9E4EC;
  --ink:#1F2933; --ink2:#7FA8C9; --ink3:#A9BFD1;
  --coral:#E8734A; --coral-deep:#E8734A; --coral-soft:#FBEAE2;
  --teal:#0E7C7B; --teal-soft:#E2EEEC;
  --amber:#8FA9BC; --amber-soft:#E8EFF4;
  --sleep:#B9C6CE; --sleep-soft:#EBF0F3;
  --shadow:0 8px 24px -14px rgba(10,74,73,.18);
}
:root[data-theme="dark"], :root.force-dark{
  --paper:#092E2D; --paper2:#0A4A49; --card:#0A4A49; --line:#155F5D;
  --ink:#EEF4F8; --ink2:#7FA8C9; --ink3:#5E8299;
  --coral:#E8734A; --coral-deep:#E8734A; --coral-soft:#4A2517;
  --teal:#4FB3A9; --teal-soft:#123F3D;
  --amber:#6E8FA6; --amber-soft:#0F3A44;
  --sleep:#5A7480; --sleep-soft:#0E3937;
  --shadow:0 8px 24px -14px rgba(0,0,0,.5);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --paper:#092E2D; --paper2:#0A4A49; --card:#0A4A49; --line:#155F5D;
    --ink:#EEF4F8; --ink2:#7FA8C9; --ink3:#5E8299;
    --coral:#E8734A; --coral-deep:#E8734A; --coral-soft:#4A2517;
    --teal:#4FB3A9; --teal-soft:#123F3D;
    --amber:#6E8FA6; --amber-soft:#0F3A44;
    --sleep:#5A7480; --sleep-soft:#0E3937;
    --shadow:0 8px 24px -14px rgba(0,0,0,.5);
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.5;
  min-height:100vh;
}
#wrap{max-width:520px;margin:0 auto;padding-bottom:90px;position:relative}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}

/* ---------- header ---------- */
#hero{background:var(--paper2);padding:26px 20px 8px;position:relative;overflow:hidden;color:var(--ink)}
#hero h1{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:30px;font-weight:800;letter-spacing:1px;position:relative;color:var(--ink)}
#hero .sub{font-size:13px;color:var(--ink2);margin-top:4px;position:relative}
#hero .toolbar{display:flex;gap:8px;margin-top:14px;position:relative;align-items:center}
.lvl{display:flex;gap:6px}
.lvl button{padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;border:1.5px solid var(--teal);color:var(--teal)}
.lvl button.on{background:var(--teal);color:#fff}
#refresh{margin-left:auto;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--teal);color:var(--teal);background:transparent;font-size:16px;
  display:flex;align-items:center;justify-content:center}
#refresh.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#hero svg.curve{display:block;width:calc(100% + 40px);margin:6px -20px -2px;height:64px}
.serif{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif}

#status{font-size:12px;color:var(--ink2);padding:10px 20px 0;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#status .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none}
#status.warn .dot{background:var(--amber)}
#status #sortbtn{margin-left:auto;flex:none;font-size:12px;font-weight:700;color:var(--teal);background:var(--teal-soft);border-radius:999px;padding:3px 10px}

/* ---------- spot cards ---------- */
.group{padding:6px 16px 0}
.group h2{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:2px;margin:14px 4px 8px;display:flex;align-items:center;gap:8px}
.group h2::after{content:"";flex:1;height:1px;background:var(--line)}
.spot{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px;
  animation:pop .4s cubic-bezier(.2,.9,.3,1.2) both}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}}
.spot .top{display:flex;align-items:flex-start;gap:10px}
.spot .names{flex:1;min-width:0}
.spot .names .n{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spot .names .r{font-size:12px;color:var(--ink2);margin-top:1px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--teal-soft);color:var(--teal);vertical-align:2px}
.tag.hard{background:var(--amber-soft);color:var(--ink)}
.fav{font-size:18px;line-height:1;padding:4px;opacity:.4;transition:.2s}
.fav.on{opacity:1;transform:scale(1.1)}
.badge{width:58px;flex:none;text-align:center;border-radius:14px;padding:7px 0 5px;color:#fff}
.badge .s{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.badge .l{font-size:10px;font-weight:700;opacity:.95;margin-top:2px}
.b-fire{background:var(--teal)}
.b-good{background:var(--ink2)}
.b-mid{background:var(--amber)}
.b-nah{background:var(--sleep)}
.spot .stats{display:flex;gap:14px;margin-top:10px;font-size:13px;color:var(--ink2);flex-wrap:wrap}
.spot .stats b{color:var(--ink);font-weight:800;font-size:15px}
.spot .win{margin-top:10px;font-size:13px;background:var(--paper2);border-radius:10px;padding:7px 10px;color:var(--ink);display:flex;gap:6px;align-items:center}
.spot .win .k{font-size:11px;font-weight:700;color:var(--ink2);flex:none}
.arr{display:inline-block;transition:.3s}
.group summary{list-style:none;cursor:pointer}
.group summary::-webkit-details-marker{display:none}
.group summary h2{margin-bottom:8px}
.fold-arrow{margin-left:auto;padding-left:8px;transition:.2s;color:var(--ink3)}
.group details[open] .fold-arrow{transform:rotate(180deg)}
.area-h{font-size:14px;font-weight:700;color:var(--ink);margin:14px 4px 8px}
.area-more summary{font-size:13px;color:var(--ink2);text-align:center;padding:6px;cursor:pointer;list-style:none}
.area-more summary::-webkit-details-marker{display:none}
.camgo{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--teal);color:#fff}

/* ---------- detail overlay ---------- */
#detail{position:fixed;inset:0;z-index:50;background:var(--paper);overflow-y:auto;transform:translateY(100%);
  transition:transform .32s cubic-bezier(.3,.9,.3,1);max-width:520px;margin:0 auto;overscroll-behavior:contain}
#detail.open{transform:translateY(0)}
#detail .dhero{background:var(--teal);color:#fff;padding:18px 20px 6px;position:sticky;top:0;z-index:5}
#detail .dhero .row{display:flex;align-items:center;gap:10px}
#detail .dhero h3{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:22px;font-weight:800;flex:1}
#detail .dhero .close,#detail .dhero .shr{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);font-size:16px;flex:none;
  display:flex;align-items:center;justify-content:center}
#detail .dhero .meta{font-size:12px;opacity:.95;margin:4px 0 10px}
.dsec{padding:16px 20px 2px}
.dsec h4{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--teal);margin-bottom:10px}
.nowgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ncell{background:var(--card);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow)}
.ncell .k{font-size:11px;color:var(--ink2)}
.ncell .v{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:19px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.ncell .v small{font-size:11px;font-weight:600;color:var(--ink2)}
.note{font-size:13px;color:var(--ink2);background:var(--card);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow)}
.note b{color:var(--ink)}
/* hour strip */
#strip{display:flex;gap:3px;overflow-x:auto;padding:6px 2px 2px;-webkit-overflow-scrolling:touch}
#strip .hb{flex:none;width:26px;display:flex;flex-direction:column;align-items:center;gap:3px}
#strip .bar{width:18px;height:64px;border-radius:6px;background:var(--sleep-soft);position:relative;overflow:hidden}
#strip .bar i{position:absolute;left:0;right:0;bottom:0;border-radius:6px}
#strip .hb.night .bar{opacity:.35}
#strip .hb .t{font-size:9px;color:var(--ink3);height:12px}
#strip .hb.now .t{color:var(--coral);font-weight:800}
#strip .hb.now .bar{outline:2px solid var(--coral)}
#strip .hb.sel .bar{outline:2px solid var(--teal);outline-offset:1px}
#hourinfo{font-size:12.5px;color:var(--ink2);margin-top:8px;min-height:18px}
#hourinfo b{color:var(--ink)}
/* windows */
.wins .w{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:10px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.wins .w .d{font-size:12px;font-weight:800;color:var(--ink2);width:40px;flex:none}
.wins .w .tm{font-size:16px;font-weight:800;flex:1}
.wins .w .tm small{display:block;font-size:11.5px;font-weight:500;color:var(--ink2)}
.wins .w .sc{font-size:13px;font-weight:800;padding:3px 10px;border-radius:999px;color:#fff}
/* tide */
#tidewrap{background:var(--card);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
#tidewrap svg{display:block;width:100%}
#tidewrap .cap{font-size:11px;color:var(--ink3);display:flex;justify-content:space-between;margin-top:4px}
/* days */
.days .dr{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:13.5px}
.days .dr:last-child{border-bottom:none}
.days .dr .dn{width:52px;flex:none;font-weight:700;color:var(--ink2);font-size:12.5px}
.days .dr .db{flex:1;height:8px;border-radius:99px;background:var(--sleep-soft);overflow:hidden}
.days .dr .db i{display:block;height:100%;border-radius:99px}
.days .dr .dv{width:120px;flex:none;text-align:right;color:var(--ink2);font-size:12px}
.days .dr .dv b{color:var(--ink);font-size:13px}

/* ---------- board ---------- */
.bcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px;margin:0 16px 14px}
.bcard h3{font-size:15px;font-weight:800;margin-bottom:12px}
.slider{margin-bottom:14px}
.slider .lab{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);margin-bottom:4px}
.slider .lab b{color:var(--ink);font-size:16px}
input[type=range]{width:100%;accent-color:var(--teal);height:28px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opts button{border:1.5px solid var(--line);border-radius:12px;padding:9px 10px;text-align:left;font-size:13px;background:var(--card)}
.opts button b{display:block;font-size:14px}
.opts button small{color:var(--ink2);font-size:11px}
.opts button.on{border-color:var(--teal);background:var(--teal-soft)}
.chips{display:flex;gap:8px}
.chips button{border:1.5px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13px}
.chips button.on{border-color:var(--teal);background:var(--teal-soft);font-weight:700}
#volout{background:var(--teal);color:#fff;border-radius:18px;padding:18px;margin:0 16px 14px;box-shadow:var(--shadow)}
#volout .big{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:40px;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
#volout .big small{font-size:16px;font-weight:600;opacity:.85}
#volout .rng{font-size:13px;opacity:.9;margin-top:2px}
.btype{display:flex;gap:10px;align-items:center;background:var(--card);border-radius:14px;padding:11px 14px;margin:0 16px 10px;box-shadow:var(--shadow)}
.btype .ic{font-size:24px;flex:none}
.btype .tx{flex:1}
.btype .tx b{font-size:14.5px}
.btype .tx div{font-size:12px;color:var(--ink2)}
.btype .len{font-size:13px;font-weight:800;color:var(--teal);flex:none;text-align:right}
.fine{font-size:12px;color:var(--ink3);padding:2px 20px 16px;line-height:1.6}

/* ---------- resource links ---------- */
a.rlink{display:flex;gap:10px;align-items:center;background:var(--card);border-radius:14px;padding:11px 14px;margin-bottom:8px;box-shadow:var(--shadow);text-decoration:none;color:var(--ink)}
a.rlink .ic{font-size:20px;flex:none}
a.rlink .tx{flex:1;min-width:0}
a.rlink .tx b{font-size:14px}
a.rlink .tx div{font-size:11.5px;color:var(--ink2)}
a.rlink .go{color:var(--teal);font-weight:800;flex:none}

/* ---------- me ---------- */
.mcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px;margin:0 16px 14px}
.mcard h3{font-size:15px;font-weight:800;margin-bottom:10px}
.mcard p{font-size:13px;color:var(--ink2);margin-bottom:6px}
.mcard p b{color:var(--ink)}

/* ---------- tabbar ---------- */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;max-width:520px;margin:0 auto;
  background:var(--card);border-top:1px solid var(--line);display:flex;
  padding:6px 0 calc(8px + env(safe-area-inset-bottom))}
#tabbar button{flex:1;font-size:12.5px;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
#tabbar button::before{content:"";display:block;width:24px;height:2px;background:transparent;border-radius:2px;margin:0 auto 3px}
#tabbar button.on{color:var(--teal)}
#tabbar button.on::before{background:var(--teal)}
.hide{display:none!important}
#loading{padding:60px 20px;text-align:center;color:var(--ink2);font-size:14px}
#loading .w{font-size:34px;animation:bob 1.2s ease-in-out infinite;display:inline-block}
@keyframes bob{50%{transform:translateY(-8px) rotate(-8deg)}}
/* ---------- onboarding ---------- */
#onboard{position:fixed;inset:0;z-index:100;background:var(--paper);overflow-y:auto;padding:48px 24px 24px;text-align:center}
#onboard .curve{width:200px;height:60px;margin:0 auto 20px;display:block}
#onboard h2{font-family:Georgia,"Noto Serif SC","Songti SC","STSong",serif;font-size:24px;font-weight:800;color:var(--ink)}
#onboard .sub{font-size:13px;color:var(--ink2);margin:8px 0 26px}
#onboard .opts{grid-template-columns:1fr;gap:12px;text-align:left}
#onboard .opts button{padding:16px 18px;border-radius:16px}
#onboard .opts button b{font-size:17px}
#onboard .opts button small{font-size:12.5px}
#cammodal{position:fixed;inset:0;z-index:80;background:rgba(9,46,45,.8);display:flex;flex-direction:column;padding:16px}
#cammodal .cbar{display:flex;align-items:center;gap:12px;color:#fff;padding:0 4px 12px}
#cammodal .cbar .ct{flex:1;font-weight:700;font-size:15px}
#cammodal .cbar a,#cammodal .cbar button{color:#fff;font-size:13px;font-weight:600}
#cammodal iframe{width:100%;height:70vh;border:0;border-radius:12px;background:#000}
</style>

<div id="wrap">
  <header id="hero">
    <h1>今天冲浪吗？</h1>
    <div class="sub" id="today"></div>
    <div class="toolbar">
      <div class="lvl" id="lvlbar">
        <button data-lvl="novice">新手</button><button data-lvl="inter">进阶</button><button data-lvl="adv">高手</button>
      </div>
      <button id="refresh" title="刷新">↻</button>
    </div>
    <svg class="curve" viewBox="0 0 1000 300" preserveAspectRatio="none" aria-hidden="true">
      <path d="M 0,210 L 120,90 L 200,150 L 300,60 L 420,170 C 520,255 580,110 690,120 C 780,128 800,215 720,225 C 860,235 940,160 1000,175"
        fill="none" stroke="var(--teal)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </header>

  <div id="status"><span class="dot"></span><span id="statustext">正在连接海洋…</span><button id="sortbtn" title="切换排序"></button></div>

  <main id="view-spots">
    <div id="loading">正在读取 12 个浪点的浪况…</div>
    <div id="spotlist"></div>
  </main>

  <main id="view-board" class="hide"></main>
  <main id="view-me" class="hide"></main>
</div>

<div id="detail"></div>

<div id="cammodal" class="hide">
  <div class="cbar"><span class="ct" id="camtitle"></span><a id="camext" target="_blank" rel="noopener">新窗口打开 ↗</a><button id="camclose">关闭 ✕</button></div>
  <iframe id="camframe" allow="autoplay; fullscreen"></iframe>
</div>

<div id="onboard" class="hide">
  <svg class="curve" viewBox="0 0 1000 300" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <path d="M 0,210 L 120,90 L 200,150 L 300,60 L 420,170 C 520,255 580,110 690,120 C 780,128 800,215 720,225 C 860,235 940,160 1000,175"
      fill="none" stroke="var(--teal)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h2>你冲到哪一步了？</h2>
  <div class="sub">评分、排序和选板都会按这个档位给默认推荐，随时可换</div>
  <div class="opts">
    <button data-oblvl="novice"><b>新手</b><small>刚起步，白浪/小浪练习</small></button>
    <button data-oblvl="inter"><b>进阶</b><small>能追绿浪、压弯转向</small></button>
    <button data-oblvl="adv"><b>高手</b><small>稳定下浪做动作</small></button>
  </div>
</div>

<nav id="tabbar">
  <button data-tab="spots" class="on">浪报</button>
  <button data-tab="board">选板</button>

const LEVELS={
 novice:{t:'新手', min:.25, ideal:.6,  max:1.2},
 inter: {t:'进阶', min:.5,  ideal:1.2, max:2.2},
 adv:   {t:'高手', min:.7,  ideal:1.8, max:3.5},
};
const CACHE_KEY='surfday_cache_v2', TTL=30*60*1000;

/* ================= state ================= */
const S={
  level: localStorage.getItem('surfday_level')||'inter',
  sort: localStorage.getItem('surfday_sort')||'score',
  favs: JSON.parse(localStorage.getItem('surfday_favs')||'[]'),
  board: JSON.parse(localStorage.getItem('surfday_board')||'{"h":175,"w":70,"lvl":"white","fit":"mid","route":"short"}'),
  data:null, at:0, source:'', tab:'spots', selHour:null,
};

/* ================= data ================= */
function apiUrls(){
  const lat=SPOTS.map(s=>s.lat).join(','), lon=SPOTS.map(s=>s.lon).join(',');
  return [
   `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,swell_wave_height,swell_wave_period,swell_wave_direction,sea_surface_temperature,sea_level_height_msl&timezone=auto&forecast_days=7`,
   `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m&daily=sunrise,sunset&timezone=auto&forecast_days=7`
  ];
}
async function load(force){
  $('#refresh').classList.add('spin');
  try{
    if(!force){
      const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
      if(c && Date.now()-c.at<TTL){ S.data=c; S.at=c.at; S.source='live'; return done(); }
    }
    const [mu,fu]=apiUrls();
    const [mr,fr]=await Promise.all([fetch(mu),fetch(fu)]);
    if(!mr.ok||!fr.ok) throw new Error('api');
    const m=await mr.json(), f=await fr.json();
    S.data={m:Array.isArray(m)?m:[m], f:Array.isArray(f)?f:[f], at:Date.now()}; S.at=Date.now(); S.source='live';
    try{localStorage.setItem(CACHE_KEY,JSON.stringify(S.data));}catch(e){}
    done();
  }catch(e){
    const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
    if(c){ S.data=c; S.at=c.at; S.source='stale'; }
    else if(window.__SNAPSHOT__){ S.data=window.__SNAPSHOT__; S.at=window.__SNAPSHOT__.at; S.source='snapshot'; }
    else { S.source='dead'; }
    done();
  }
}
function done(){
  $('#refresh').classList.remove('spin');
  const st=$('#status'), tx=$('#statustext');
  st.classList.remove('warn');
  if(S.source==='live'){ tx.textContent=`Open-Meteo 实时浪况 · 更新于 ${fmtClock(S.at)} · 均为浪点当地时间`; }
  else if(S.source==='stale'){ st.classList.add('warn'); tx.textContent=`网络不通，展示 ${fmtClock(S.at)} 的缓存数据`; }
  else if(S.source==='snapshot'){ st.classList.add('warn'); tx.textContent=`预览模式：内置 ${new Date(S.at).toLocaleDateString('zh-CN')} 数据快照（部署后自动实时）`; }
  else { st.classList.add('warn'); tx.textContent='拿不到数据 😢 检查网络后点右上角刷新'; }
  render();
}
const fmtClock=t=>new Date(t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

/* ================= scoring ================= */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const angDiff=(a,b)=>{let d=Math.abs(a-b)%360;return d>180?360-d:d;};
function windRel(spot,wdir){
  const off=(spot.facing+180)%360, d=angDiff(wdir,off), c=Math.cos(d*Math.PI/180);
  return {c, t: c>.42?'离岸风':(c<-.42?'向岸风':'侧风')};
}
function scoreHour(spot,size,per,wspd,wdir,lvlKey){
  if(size==null) return null;
  const L=LEVELS[lvlKey];
  let sizeScore;
  if(size<L.min) sizeScore=clamp(size/L.min,0,1)*.45;
  else if(size>L.max) sizeScore=clamp(1-(size-L.max)/L.max,0,1)*.7;
  else sizeScore=1-Math.abs(size-L.ideal)/(L.max-L.min)*.55;
  const periodScore=clamp(((per==null?6:per)-4.5)/7.5,0,1);
  let windScore=.95;
  if(wspd!=null&&wspd>7){
    const c=windRel(spot,wdir==null?0:wdir).c;
    const pen=c>.3?.008:(c<-.3?.035:.02);
    windScore=clamp(1-(wspd-7)*pen,.05,1);
  }
  return Math.round(100*(0.45*sizeScore+0.25*periodScore+0.30*windScore));
}
function rating(sc){
  if(sc>=72) return {t:'冲！',cls:'b-fire',col:'var(--teal)'};
  if(sc>=55) return {t:'不错',cls:'b-good',col:'var(--ink2)'};
  if(sc>=38) return {t:'凑合',cls:'b-mid',col:'var(--amber)'};
  return {t:'算了',cls:'b-nah',col:'var(--sleep)'};
}
const barColor=sc=>sc>=72?'var(--teal)':sc>=55?'var(--ink2)':sc>=38?'var(--amber)':'var(--sleep)';

/* 计算一个浪点的全量视图数据 */
function compute(i){
  const spot=SPOTS[i], m=S.data.m[i], f=S.data.f[i];
  if(!m||!f||!m.hourly) return null;
  const mt=m.hourly.time, fIdx=new Map(f.hourly.time.map((t,j)=>[t,j]));
  // 浪点当地"现在"
  const nowLocal=new Date(Date.now()+(m.utc_offset_seconds||0)*1000).toISOString();
  let nowI=mt.findIndex(t=>t.slice(0,13)===nowLocal.slice(0,13));
  if(nowI<0) nowI=Math.min(new Date().getHours(),mt.length-1); // 快照过期时的兜底
  // 日出日落表
  const sun={};
  (f.daily&&f.daily.time||[]).forEach((d,j)=>{sun[d]=[+f.daily.sunrise[j].slice(11,13),+f.daily.sunset[j].slice(11,13)];});
  const hours=mt.map((t,j)=>{
    const fj=fIdx.get(t);
    const wspd=fj!=null?f.hourly.wind_speed_10m[fj]:null, wdir=fj!=null?f.hourly.wind_direction_10m[fj]:null;
    const size=m.hourly.wave_height[j], per=m.hourly.swell_wave_period[j];
    const d=t.slice(0,10), hh=+t.slice(11,13), sr=sun[d]?sun[d][0]:6, ss=sun[d]?sun[d][1]:18;
    const day=hh>=sr&&hh<=ss;
    return {t,j,hh,date:d,day,size,per,wspd,wdir,
      sst:m.hourly.sea_surface_temperature[j], tide:m.hourly.sea_level_height_msl[j],
      sdir:m.hourly.swell_wave_direction[j],
      score:day?scoreHour(spot,size,per,wspd,wdir,S.level):scoreHour(spot,size,per,wspd,wdir,S.level)};
  });
  // 按日期分组 → 最佳窗口
  const dates=[...new Set(hours.map(h=>h.date))];
  const days=dates.map(d=>{
    const hs=hours.filter(h=>h.date===d&&h.day&&h.score!=null);
    if(!hs.length) return {d,win:null,max:0,avgSize:0};
    const max=Math.max(...hs.map(h=>h.score));
    const avgSize=hs.reduce((a,h)=>a+(h.size||0),0)/hs.length;
    // 连续 score>=55 的段取峰值最高的一段，再收窄到峰值附近（差 8 分以内），避免"全天都是窗口"
    let runs=[],run=null;
    hs.forEach(h=>{ if(h.score>=55){(run=run||[]).push(h);} else if(run){runs.push(run);run=null;} });
    if(run)runs.push(run);
    let best=null;
    if(runs.length){
      const r=runs.reduce((a,b)=>Math.max(...b.map(h=>h.score))>Math.max(...a.map(h=>h.score))?b:a);
      const peak=r.reduce((a,h)=>h.score>a.score?h:a);
      const thr=Math.max(55,peak.score-8);
      let i0=r.indexOf(peak),i1=i0;
      while(i0>0&&r[i0-1].score>=thr)i0--;
      while(i1<r.length-1&&r[i1+1].score>=thr)i1++;
      best={from:r[i0],to:r[i1],peak:peak.score,peakT:peak.t};
    }
    return {d,win:best,max,avgSize};
  });
  const cur=hours[nowI]||hours[0];
  return {spot,m,f,hours,days,nowI,cur};
}

/* ================= render:浪报 ================= */
const DOW=['周日','周一','周二','周三','周四','周五','周六'];
/* ref = 浪点当地的"今天"（cur.date），避免 UTC 偏移和跨时区错一天 */
const dayName=(d,ref)=>{const off=Math.round((new Date(d)-new Date(ref))/864e5);
  return off===0?'今天':off===1?'明天':off===2?'后天':DOW[new Date(d).getDay()];};
const fm=(v,d=1)=>v==null?'–':(+v).toFixed(d);
function winText(w){ if(!w) return null;
  const to=(+w.to.t.slice(11,13)+1);
  return `${w.from.t.slice(11,16)}–${String(to).padStart(2,'0')}:00`; }

function render(){ renderSpots(); renderBoard(); renderMe(); }
function renderSpots(){
  $('#loading').classList.toggle('hide',!!S.data||S.source==='dead');
  const box=$('#spotlist');
  if(!S.data){ box.innerHTML=''; return; }
  const views=SPOTS.map((s,i)=>compute(i)).filter(Boolean);
  const bySort=arr=>S.sort==='score'?[...arr].sort((a,b)=>(b.cur.score??-1)-(a.cur.score??-1)):arr;
  const fav=bySort(views.filter(v=>S.favs.includes(v.spot.id)));
  const cn=views.filter(v=>v.spot.cn&&!S.favs.includes(v.spot.id));
  const intl=views.filter(v=>!v.spot.cn&&!S.favs.includes(v.spot.id));
  const grp=(title,arr)=>arr.length?`<section class="group"><h2>${title}</h2>${arr.map(card).join('')}</section>`:'';
  const grpFold=(title,inner)=>inner?`<section class="group"><details><summary><h2>${title}<span class="fold-arrow">▾</span></h2></summary>${inner}</details></section>`:'';
  box.innerHTML=grp('⭐ 收藏',fav)+areaBlocks(AREAS.cn,cn)+grpFold('🌍 全球',areaBlocks(AREAS.intl,intl));
}
function areaBlocks(defs,views){
  const byArea=defs.map(([id,label])=>{
    const arr=views.filter(v=>v.spot.area===id);
    return {id,label,arr,best:arr.length?Math.max(...arr.map(v=>v.cur.score??-1)):-Infinity};
  }).filter(a=>a.arr.length);
  const ordered=S.sort==='score'?[...byArea].sort((a,b)=>b.best-a.best):byArea;
  return ordered.map(a=>{
    const sorted=[...a.arr].sort((x,y)=>(y.cur.score??-1)-(x.cur.score??-1));
    const [top,...rest]=sorted;
    const count=a.arr.length>1?`<span style="font-size:12px;color:var(--ink3);font-weight:400">· ${a.arr.length} 个浪点</span>`:'';
    const more=rest.length?`<details class="area-more"><summary>该区域还有 ${rest.length} 个 ▾</summary>${rest.map(card).join('')}</details>`:'';
    return `<div class="area-h">${a.label}${count}</div>${card(top)}${more}`;
  }).join('');
}
function card(v){
  const {spot,cur}=v, r=rating(cur.score||0);
  const today=v.days.find(d=>d.d===cur.date)||v.days[0];
  const wr=cur.wdir!=null?windRel(spot,cur.wdir):null;
  const win=today&&today.win?`<b>${winText(today.win)}</b> 峰值 ${today.win.peak} 分`
    :(today&&today.max?`没有好窗口，最高也就 ${today.max} 分`:'今天基本是湖');
  return `<article class="spot" data-id="${spot.id}">
    <div class="top">
      <div class="names">
        <div class="n">${spot.flag} ${spot.name} <span class="tag ${spot.hard?'hard':''}">${spot.lvl}</span></div>
        <div class="r">${spot.region}</div>
      </div>
      <button class="fav ${S.favs.includes(spot.id)?'on':''}" data-fav="${spot.id}">${S.favs.includes(spot.id)?'⭐':'☆'}</button>
      <div class="badge ${r.cls}"><div class="s">${cur.score==null?'–':cur.score}</div><div class="l">${r.t}</div></div>
    </div>
    <div class="stats">
      <span>浪高 <b>${fm(cur.size)}m</b></span>
      <span>周期 <b>${fm(cur.per,0)}s</b></span>
      <span>风 <b>${fm(cur.wspd,0)}</b>km/h ${wr?wr.t:''}</span>${cur.day?'':'<span>🌙 天没亮</span>'}
      ${(RES[spot.id]||[]).some(r=>r.cam)?`<button class="camgo" data-cam="${spot.id}">📷 实况</button>`:''}
    </div>
    <div class="win"><span class="k">今日最佳</span><span>${win}</span></div>
  </article>`;
}

    hb.classList.add('sel');
    const h=hours[+hb.dataset.h], rr=rating(h.score||0);
    $('#hourinfo').innerHTML=`<b>${dayName(h.date,cur.date)} ${h.t.slice(11,16)}</b> · <b style="color:${rr.col}">${h.score}分 ${rr.t}</b> · 浪 ${fm(h.size)}m@${fm(h.per,0)}s · 风 ${fm(h.wspd,0)}km/h ${h.wdir!=null?windRel(spot,h.wdir).t:''}${h.day?'':' · 🌙夜间'}`;
  });
}
function resLinks(spot){
  const rs=RES[spot.id]||[];
  const isurf=spot.cn?'<div class="note" style="margin-top:2px">📱 国内浪点直播大多在微信小程序「爱冲浪Isurf」里，出发前问在地浪店最靠谱</div>':'';
  if(!rs.length) return isurf||'<div class="note">该浪点暂无公开摄像头，出发前问在地浪店/教练最靠谱</div>';
  return rs.map(r=>`<a class="rlink" href="${r.u}" target="_blank" rel="noopener"><span class="ic">${r.cam?'📷':'📊'}</span><span class="tx"><b>${r.t}</b>${r.n?`<div>${r.n}</div>`:''}</span><span class="go">↗</span></a>`).join('')+isurf;
}
function wetsuit(t){
  if(t==null) return '看着办，带件防磨衣总没错';
  if(t>=27)return '板裤/比基尼 + 防晒衣，重点是防晒';
  if(t>=24)return '板裤或薄款水母衣';
  if(t>=21)return '2mm 短袖春秋衣';
  if(t>=17)return '3/2mm 全身湿衣';
  if(t>=13)return '4/3mm 全身湿衣 + 防寒靴';
  return '5/4mm 连帽湿衣，真勇士';
}
async function share(v){
  const {spot,cur,days}=v;
  const today=days.find(d=>d.d===cur.date)||days[0];
  const txt=`【今天冲浪吗】${spot.name} ${cur.score}分 · 浪${fm(cur.size)}m@${fm(cur.per,0)}s`+
    (today&&today.win?` · 最佳窗口 ${winText(today.win)}`:'')+` 走起？🏄`;
  try{ if(navigator.share){await navigator.share({text:txt});return;} }catch(e){}
  try{ await navigator.clipboard.writeText(txt); alert('已复制浪报，发给浪友吧 🤙'); }
  catch(e){ prompt('复制这段浪报：',txt); }
}

/* ================= render:选板 ================= */
const BL={green:{t:'纯新手',d:'没下过水 / 前几次',gf:.85},white:{t:'初学者',d:'能在白浪起乘站稳',gf:.55},
  inter:{t:'进阶',d:'能追绿浪、压弯转向',gf:.42},adv:{t:'高手',d:'稳定下浪做动作',gf:.36}};
const FIT={low:{t:'很少运动',adj:.08},mid:{t:'一般',adj:.03},high:{t:'体能很好',adj:-.04}};
const ftin=cm=>{const f=Math.floor(cm/30.48),i=Math.round((cm-f*30.48)/2.54);return i===12?`${f+1}'0"`:`${f}'${i}"`;};
const LB_LEN=w=>w<60?'8\'10"–9\'2"':w<75?'9\'0"–9\'4"':w<90?'9\'2"–9\'8"':'9\'6"+';
function boardRec(){
  const {h,w,lvl,fit}=S.board, L=BL[lvl], vol=w*L.gf*(1+FIT[fit].adj);
  const lo=(vol*.92).toFixed(0), hi=(vol*1.08).toFixed(0);
  let types=[];
  let note='';
  if(lvl==='green'){ types=[
    ['🧽','软板 Soft-top','宽厚稳、摔了不疼，白浪里练起乘','8\'0"–9\'0"']];
    note='长板引导去长板路线看'; }
  else if(lvl==='white'){ types=[
    ['🏄','Funboard','长板与短板之间的过渡神器，操控更灵活','7\'6"–8\'6"'],
    ['🧽','软板 Soft-top','容错高，起乘早，小浪也快乐','8\'0"+']];
    note='长板引导去长板路线看'; }
  else if(lvl==='inter') types=[
    ['🐟','鱼板 Fish','小浪快乐机，速度快浮力足',`${ftin(h-2)}–${ftin(h+8)}`],
    ['🏄','Funboard','浪小或想放松的日子','6\'8"–7\'4"'],
    ['⚡','小短板 Groveler','开始练动作的第一块短板',`${ftin(h+2)}–${ftin(h+10)}`]];
  else types=[
    ['⚡','短板 Shortboard','主力性能板',`${ftin(h+3)}–${ftin(h+13)}`],
    ['🐟','鱼板 / Twin','小浪日备用',`${ftin(h-5)}–${ftin(h+3)}`],
    ['🌊','Step-up','浪头上量的日子',`${ftin(h+13)}–${ftin(h+23)}`]];
  return {vol,lo,hi,types,note};
}
function longRec(){
  const {h,w,lvl}=S.board, range=LB_LEN(w);
  let types=[
    ['🪵','经典 Log','单舵，跨步走板式滑行，任何水平都能玩','9\'0"–9\'6"'],
    ['⚡','高性能长板','2+1 舵设，能转能压弯，需要进阶以上水平','9\'0"–9\'4"']];
  let len=lvl==='green'?'9\'0"':w<60?'9\'0"':w<75?'9\'2"':w<90?'9\'4"':'9\'6"';
  let note=lvl==='green'?'新手建议从 9\'0" 软板长板起步':'';
  return {len,range,types,note};
}
function renderBoard(){
  const {h,w,lvl,fit,route}=S.board, rec=boardRec(), lrec=longRec();
  const short=route!=='long';
  $('#view-board').innerHTML=`
   <div style="height:14px"></div>
   <div class="bcard"><h3 style="margin-bottom:8px">选路线</h3>
     <div class="opts" style="grid-template-columns:1fr 1fr">
       <button data-broute="short" class="${short?'on':''}"><b>短板路线</b><small>追浪灵活做动作，容积算准是关键</small></button>
       <button data-broute="long" class="${!short?'on':''}"><b>长板路线</b><small>优雅滑行早起乘，长度稳定性优先</small></button>
     </div>
   </div>
   <div class="bcard"><h3>🏄 你的身体数据</h3>
     <div class="slider"><div class="lab"><span>身高</span><b>${h} cm</b></div>
       <input type="range" id="bh" min="140" max="200" value="${h}"></div>
     <div class="slider"><div class="lab"><span>体重</span><b>${w} kg</b></div>
       <input type="range" id="bw" min="38" max="115" value="${w}"></div>
     <h3 style="margin-top:6px">水平</h3>
     <div class="opts">${Object.entries(BL).map(([k,v])=>`<button data-blvl="${k}" class="${k===lvl?'on':''}"><b>${v.t}</b><small>${v.d}</small></button>`).join('')}</div>
     <h3 style="margin:12px 0 8px">体能${short?'':'（长板路线不参与计算）'}</h3>
     <div class="chips" style="${short?'':'opacity:.4;pointer-events:none'}">${Object.entries(FIT).map(([k,v])=>`<button data-bfit="${k}" class="${k===fit?'on':''}">${v.t}</button>`).join('')}</div>
   </div>
   <div id="volout">
   ${short?`
     <div style="font-size:12px;letter-spacing:2px;opacity:.85">推荐板容积</div>
     <div class="big">${rec.vol.toFixed(0)}<small> 升 L</small></div>
     <div class="rng">合适区间 ${rec.lo}–${rec.hi}L · 按 ${w}kg × ${BL[lvl].t}系数 ${BL[lvl].gf}${FIT[fit].adj?` × 体能${FIT[fit].adj>0?'+':''}${(FIT[fit].adj*100).toFixed(0)}%`:''}</div>
   `:`
     <div style="font-size:12px;letter-spacing:2px;opacity:.85">推荐长度</div>
     <div class="big">${lrec.len}</div>
     <div class="rng">按体重区间 ${w}kg → ${lrec.range} · 经典长板通常 60–80L，重稳定不重精算</div>
   `}
   </div>
   ${short&&rec.note?`<div class="note" style="margin:8px 4px 0">${rec.note}</div>`:''}
   ${short?rec.types.map(t=>`<div class="btype"><div class="ic">${t[0]}</div><div class="tx"><b>${t[1]}</b><div>${t[2]}</div></div><div class="len">${t[3]}</div></div>`).join(''):''}
   ${!short&&lrec.note?`<div class="note" style="margin:8px 4px 0">${lrec.note}</div>`:''}
   ${!short?lrec.types.map(t=>`<div class="btype"><div class="ic">${t[0]}</div><div class="tx"><b>${t[1]}</b><div>${t[2]}</div></div><div class="len">${t[3]}</div></div>`).join(''):''}
   <div class="fine">买板口诀：宁大勿小——容积大 10% 你多划两下就适应了，小 10% 可能直接下不了浪。租板/买二手先按上面区间试，品牌官网都有具体型号的容积表可对照。<br>容积系数参考 Firewire/Boardcave 公开指引校准。</div>`;
  $('#bh').oninput=e=>{S.board.h=+e.target.value;save();renderBoard();};
  $('#bw').oninput=e=>{S.board.w=+e.target.value;save();renderBoard();};
}

/* ================= events ================= */
document.addEventListener('click',e=>{
  const t=e.target;
  const tab=t.closest('#tabbar button');
  if(tab){ S.tab=tab.dataset.tab;
    document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on',b===tab));
    $('#view-spots').classList.toggle('hide',S.tab!=='spots');
    $('#view-board').classList.toggle('hide',S.tab!=='board');
    $('#view-me').classList.toggle('hide',S.tab!=='me');
    return; }
  const lv=t.closest('#lvlbar button');
  if(lv){ S.level=lv.dataset.lvl; save(); syncLvl(); render(); return; }
  const melv=t.closest('[data-melvl]');
  if(melv){ S.level=melv.dataset.melvl; save(); syncLvl(); render(); return; }
  const fv=t.closest('[data-fav]');
  if(fv){ const id=fv.dataset.fav;
    S.favs=S.favs.includes(id)?S.favs.filter(x=>x!==id):[...S.favs,id];
    save(); renderSpots(); renderMe(); return; }
  const uf=t.closest('[data-unfav]');
  if(uf){ S.favs=S.favs.filter(x=>x!==uf.dataset.unfav); save(); renderSpots(); renderMe(); return; }
  const ob=t.closest('[data-oblvl]');
  if(ob){ const lv=ob.dataset.oblvl;
    S.level=lv;
    S.board.lvl=lv==='novice'?'white':lv==='inter'?'inter':'adv';
    localStorage.setItem('surfday_onboarded','1');
    save(); syncLvl(); $('#onboard').classList.add('hide'); render(); return; }
  const br=t.closest('[data-broute]');
  if(br){ S.board.route=br.dataset.broute; save(); renderBoard(); return; }
  const bl=t.closest('[data-blvl]');
  if(bl){ S.board.lvl=bl.dataset.blvl; save(); renderBoard(); return; }
  const bf=t.closest('[data-bfit]');
  if(bf){ S.board.fit=bf.dataset.bfit; save(); renderBoard(); return; }
  const cg=t.closest('.camgo');
  if(cg){ e.stopPropagation(); openCam(cg.dataset.cam); return; }
  const sp=t.closest('.spot');
  if(sp&&!t.closest('.fav')){ openDetail(sp.dataset.id); return; }
});
function openCam(id){
  const cam=(RES[id]||[]).find(r=>r.cam);
  if(!cam) return;
  const spot=SPOTS.find(s=>s.id===id);
  let host=''; try{ host=new URL(cam.u).hostname; }catch(e){}
  if(EMBED_OK.some(d=>host===d||host.endsWith('.'+d))){
    $('#camtitle').textContent=(spot?spot.name:'')+' 实况';
    $('#camext').href=cam.u;
    $('#camframe').src=cam.u;
    $('#cammodal').classList.remove('hide');
  } else {
    window.open(cam.u,'_blank','noopener');
  }
}
$('#camclose').onclick=()=>{ $('#cammodal').classList.add('hide'); $('#camframe').src=''; };
$('#refresh').onclick=()=>load(true);
function syncSort(){ $('#sortbtn').textContent=S.sort==='score'?'按评分 ↓':'按浪点'; }
$('#sortbtn').onclick=()=>{ S.sort=S.sort==='score'?'default':'score'; save(); syncSort(); renderSpots(); };
function syncLvl(){ document.querySelectorAll('#lvlbar button').forEach(b=>b.classList.toggle('on',b.dataset.lvl===S.level)); }

/* ================= boot ================= */
$('#today').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'})+' · 浪人专用天气台';
syncLvl();
syncSort();
if(!localStorage.getItem('surfday_onboarded')) $('#onboard').classList.remove('hide');
load(false);
</script>
